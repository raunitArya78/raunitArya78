name: GitHub Space Shooter
permissions:
  contents: write

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  shoot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Space Shooter
        uses: zane/GitHubSpaceShooter@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          username: raunitArya78
          output-path: space-shooter.gif
          strategy: random
          fps: 40
          commit-message: "Update GitHub Space Shooter GIF"

      - name: Push output
        run: |
          git add space-shooter.gif
          git commit -m "Update GitHub Space Shooter GIF" || echo "Nothing to commit"
          git push
